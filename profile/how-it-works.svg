<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1056 300" width="1056" height="300" role="img" aria-label="XAgent product system flow">
<defs>
<pattern id="grid" width="18" height="18" patternUnits="userSpaceOnUse"><path d="M18 0H0V18" fill="none" stroke="#E8EEE9" stroke-width="1" opacity=".7"/></pattern>
<linearGradient id="line" x1="0" x2="1"><stop offset="0" stop-color="#53DE97"/><stop offset=".52" stop-color="#7BB6FF"/><stop offset="1" stop-color="#53DE97"/></linearGradient>
<filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0E2B1B" flood-opacity=".08"/></filter>
<style>
.title{font:700 18px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;fill:#161B22}
.kicker{font:600 10px SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace;letter-spacing:2.2px;fill:#7B8A82}
.label{font:700 14px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;fill:#1D2329}
.text{font:500 11px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;fill:#7A8580}
.mono{font:500 11px SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace;fill:#5F6C65}
.green{fill:#53DE97}.blue{fill:#5F9EF8}.ink{fill:#1D2329}.muted{fill:#8B9690}
</style>
</defs>
<rect width="1056" height="300" rx="16" fill="#FFFFFF"/>
<rect width="1056" height="300" rx="16" fill="url(#grid)"/>
<rect x="1" y="1" width="1054" height="298" rx="16" fill="none" stroke="#DFE7E2"/>
<text x="42" y="38" class="kicker">PRODUCT SYSTEM / INTENT TO SETTLEMENT</text>
<text x="42" y="68" class="title">How XAgent becomes a shippable agent product</text>
<path d="M42 88H1014" stroke="#DCE5DF"/>
<path d="M42 88H338" stroke="#53DE97" stroke-width="2"/>

<g filter="url(#soft)">
<g transform="translate(58 118)"><rect width="178" height="76" rx="12" fill="#FFFFFF" stroke="#D7E2DB"/><text x="20" y="30" class="label">Intent</text><text x="20" y="53" class="text">plain language spec</text><rect x="20" y="63" width="58" height="3" rx="1.5" fill="#53DE97"/></g>
<g transform="translate(300 118)"><rect width="178" height="76" rx="12" fill="#FFFFFF" stroke="#D7E2DB"/><text x="20" y="30" class="label">Builder</text><text x="20" y="53" class="text">skills, flows, tools</text><rect x="20" y="63" width="82" height="3" rx="1.5" fill="#8FD7FF"/></g>
<g transform="translate(542 118)"><rect width="178" height="76" rx="12" fill="#FFFFFF" stroke="#D7E2DB"/><text x="20" y="30" class="label">Runtime</text><text x="20" y="53" class="text">memory, wallet, accounts</text><rect x="20" y="63" width="112" height="3" rx="1.5" fill="#53DE97"/></g>
<g transform="translate(784 118)"><rect width="178" height="76" rx="12" fill="#FFFFFF" stroke="#D7E2DB"/><text x="20" y="30" class="label">Market</text><text x="20" y="53" class="text">publish, monetize, settle</text><rect x="20" y="63" width="132" height="3" rx="1.5" fill="#53DE97"/></g>
</g>

<path d="M238 156H296" stroke="url(#line)" stroke-width="2"/><path d="M480 156H538" stroke="url(#line)" stroke-width="2"/><path d="M722 156H780" stroke="url(#line)" stroke-width="2"/>
<path d="M286 150L298 156L286 162" fill="none" stroke="#53DE97" stroke-width="2"/><path d="M528 150L540 156L528 162" fill="none" stroke="#53DE97" stroke-width="2"/><path d="M770 150L782 156L770 162" fill="none" stroke="#53DE97" stroke-width="2"/>

<rect x="58" y="224" width="904" height="40" rx="12" fill="#F8FBF9" stroke="#DCE5DF"/>
<text x="80" y="249" class="mono"><tspan fill="#1D2329">runtime spine</tspan> · acts · remembers · calls tools · connects accounts · wallet-aware policy · <tspan fill="#168A57">x402 settle on-chain</tspan></text>
<circle cx="922" cy="244" r="5" fill="#53DE97"/><text x="938" y="248" class="text">contracts verified</text>
</svg>