<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1056 340" width="1056" height="340" role="img" aria-label="XAgent product pipeline">
  <defs>
    <pattern id="grid" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M18 0H0V18" fill="none" stroke="#EDF3EF" stroke-width="1"/>
    </pattern>
    <radialGradient id="halo" cx="50%" cy="52%" r="68%">
      <stop offset="0" stop-color="#EFFFF6" stop-opacity=".85"/>
      <stop offset=".52" stop-color="#F7FBFF" stop-opacity=".52"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="signal" x1="82" y1="0" x2="974" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5FE3A1"/>
      <stop offset=".46" stop-color="#73B7FF"/>
      <stop offset="1" stop-color="#5FE3A1"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FCFA"/>
    </linearGradient>
    <filter id="lift" x="-18%" y="-35%" width="136%" height="170%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#173A28" flood-opacity=".09"/>
    </filter>
    <style>
      .kicker{font:700 10px SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace;letter-spacing:2.5px;fill:#7B8983}
      .title{font:680 28px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;fill:#121A17}
      .label{font:720 15px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;fill:#17211D}
      .body{font:520 12px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;fill:#73817A}
      .mono{font:600 10px SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace;letter-spacing:1.2px;fill:#6E7D76}
      .fine{font:560 10.5px SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace;fill:#607169}
    </style>
  </defs>

  <rect width="1056" height="340" rx="22" fill="#FFFFFF"/>
  <rect width="1056" height="340" rx="22" fill="url(#grid)"/>
  <rect width="1056" height="340" rx="22" fill="url(#halo)"/>
  <rect x="1" y="1" width="1054" height="338" rx="22" fill="none" stroke="#DAE6DF"/>

  <text x="54" y="44" class="kicker">XAGENT / PRODUCT PIPELINE</text>
  <text x="54" y="78" class="title">Speak, build, run, settle.</text>
  <text x="1002" y="44" text-anchor="end" class="kicker">AGENT PRODUCT SYSTEM</text>
  <path d="M54 100H1002" stroke="#DCE6E0"/>
  <path d="M54 100H312" stroke="#5FE3A1" stroke-width="2"/>

  <path d="M248 183H350" stroke="#D2E2DA" stroke-width="18" stroke-linecap="round"/>
  <path d="M710 183H760" stroke="#D2E2DA" stroke-width="18" stroke-linecap="round"/>
  <path d="M248 183H350" stroke="url(#signal)" stroke-width="3" stroke-linecap="round"/>
  <path d="M710 183H760" stroke="url(#signal)" stroke-width="3" stroke-linecap="round"/>
  <path d="M334 174L352 183L334 192" fill="none" stroke="#5FE3A1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M744 174L762 183L744 192" fill="none" stroke="#5FE3A1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#lift)">
    <rect x="82" y="134" width="166" height="98" rx="18" fill="url(#panel)" stroke="#D2E1D8"/>
    <rect x="350" y="118" width="360" height="130" rx="24" fill="url(#panel)" stroke="#CFE0D7"/>
    <rect x="760" y="134" width="214" height="98" rx="18" fill="url(#panel)" stroke="#D2E1D8"/>
  </g>

  <text x="106" y="164" class="mono">01 INTENT</text>
  <text x="106" y="193" class="label">Plain language</text>
  <text x="106" y="216" class="body">requirements, goals,</text>
  <text x="106" y="234" class="body">constraints</text>
  <path d="M106 148H182" stroke="#5FE3A1" stroke-width="3" stroke-linecap="round"/>

  <text x="388" y="152" class="mono">02 BUILDER + RUNTIME</text>
  <text x="388" y="183" class="label">Agent operating core</text>
  <text x="388" y="207" class="body">skills, memory, tools, accounts</text>
  <path d="M388 226H604" stroke="#D6E6DE" stroke-width="1"/>
  <text x="388" y="238" class="fine">acts / remembers / signs policy</text>
  <circle cx="648" cy="182" r="34" fill="#F6FCF9" stroke="#CFE2D8"/>
  <circle cx="648" cy="182" r="8" fill="#5FE3A1"/>
  <path d="M624 182H672" stroke="#73B7FF" stroke-width="2" stroke-linecap="round"/>
  <path d="M648 158V206" stroke="#D6E6DE" stroke-width="1"/>

  <text x="786" y="164" class="mono">03 PRODUCT</text>
  <text x="786" y="193" class="label">Publish + settle</text>
  <text x="786" y="216" class="body">marketplace, usage,</text>
  <text x="786" y="234" class="body">x402 rails</text>
  <path d="M786 148H910" stroke="#73B7FF" stroke-width="3" stroke-linecap="round"/>

  <rect x="82" y="276" width="892" height="38" rx="15" fill="#F8FCFA" stroke="#DCE8E1"/>
  <path d="M106 295H214" stroke="#5FE3A1" stroke-width="3" stroke-linecap="round"/>
  <text x="240" y="299" class="fine">verified contracts</text>
  <text x="404" y="299" class="fine">hosted runtime</text>
  <text x="566" y="299" class="fine">wallet-aware execution</text>
  <text x="792" y="299" class="fine">x402 settlement</text>
  <path d="M914 295H950" stroke="#73B7FF" stroke-width="3" stroke-linecap="round"/>
</svg>
