<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" role="img" aria-label="XAgent — build, run and monetize AI agents.">
  <defs>
    <!-- warm ink base with a subtle vertical lift -->
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f1f1e"/>
      <stop offset="1" stop-color="#171716"/>
    </linearGradient>
    <!-- lime glow, top-right, the single brand light source -->
    <radialGradient id="glow" cx="0.82" cy="0.16" r="0.62">
      <stop offset="0" stop-color="#cefe7d" stop-opacity="0.30"/>
      <stop offset="0.45" stop-color="#cefe7d" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#cefe7d" stop-opacity="0"/>
    </radialGradient>
    <!-- faint stone glow, bottom-left, for depth balance -->
    <radialGradient id="glow2" cx="0.06" cy="0.95" r="0.55">
      <stop offset="0" stop-color="#f5f5f4" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#f5f5f4" stop-opacity="0"/>
    </radialGradient>
    <!-- 16px engineering grid, extremely faint -->
    <pattern id="grid" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M16 0 H0 V16" fill="none" stroke="#f5f5f4" stroke-width="1" stroke-opacity="0.028"/>
    </pattern>
    <!-- lime tile with a soft inner sheen for the logo mark -->
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dcff9a"/>
      <stop offset="1" stop-color="#c2f56a"/>
    </linearGradient>
  </defs>

  <!-- ===== canvas ===== -->
  <rect width="1280" height="320" fill="url(#base)"/>
  <rect width="1280" height="320" fill="url(#grid)"/>
  <rect width="1280" height="320" fill="url(#glow)"/>
  <rect width="1280" height="320" fill="url(#glow2)"/>

  <!-- ===== top hairline + kicker ===== -->
  <rect x="64" y="56" width="1152" height="1" fill="#f5f5f4" fill-opacity="0.10"/>
  <rect x="64" y="56" width="72" height="1" fill="#cefe7d"/>
  <text x="64" y="46" font-family="ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace" font-size="11.5" letter-spacing="3.2" fill="#a3a39d">AI-NATIVE AGENT PLATFORM</text>
  <text x="1216" y="46" text-anchor="end" font-family="ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace" font-size="11.5" letter-spacing="3.2" fill="#a3a39d">SPEAK TO BUILD · SHARE TO CONNECT</text>

  <!-- ===== logo mark: lime tile + angular X ===== -->
  <g transform="translate(64,104)">
    <rect width="112" height="112" rx="26" fill="url(#tile)"/>
    <g stroke="#171716" stroke-width="15" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M36 34 L56 54 L76 34"/>
      <path d="M36 78 L56 58 L76 78"/>
    </g>
  </g>

  <!-- ===== wordmark ===== -->
  <text x="208" y="188" font-size="88" font-weight="800" letter-spacing="-3" fill="#f7f7f5">XAgent</text>

  <!-- tagline -->
  <text x="212" y="228" font-size="20" font-weight="500" fill="#c9c9c3">Build, run &amp; monetize AI agents<tspan fill="#cefe7d" font-weight="700">.</tspan></text>

  <!-- ===== right metadata rail ===== -->
  <rect x="1096" y="116" width="1" height="88" fill="#f5f5f4" fill-opacity="0.12"/>
  <rect x="1096" y="116" width="1" height="18" fill="#cefe7d"/>
  <text x="1216" y="130" text-anchor="end" font-family="ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace" font-size="12" letter-spacing="2.2" fill="#cefe7d">$XAGT</text>
  <text x="1216" y="158" text-anchor="end" font-family="ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace" font-size="12" letter-spacing="2.2" fill="#a3a39d">X LAYER · x402</text>
  <text x="1216" y="186" text-anchor="end" font-family="ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace" font-size="12" letter-spacing="2.2" fill="#a3a39d">EST. TOKYO 2025</text>

  <!-- ===== bottom hairline + colophon ===== -->
  <g fill="#cefe7d">
    <rect x="64" y="252" width="6" height="6"/><rect x="70" y="246" width="6" height="6"/><rect x="76" y="240" width="6" height="6"/>
  </g>
  <rect x="64" y="272" width="1152" height="1" fill="#f5f5f4" fill-opacity="0.10"/>
  <rect x="1144" y="272" width="72" height="1" fill="#cefe7d"/>
  <text x="64" y="296" font-family="ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace" font-size="11.5" letter-spacing="2.4" fill="#8f8f89">XAGT.AI</text>
  <text x="640" y="296" text-anchor="middle" font-family="ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace" font-size="11.5" letter-spacing="2.4" fill="#8f8f89">ON-CHAIN BY DESIGN · SETTLED VIA x402</text>
  <text x="1216" y="296" text-anchor="end" font-family="ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace" font-size="11.5" letter-spacing="2.4" fill="#8f8f89">@XAGENT_OFFICIAL</text>
</svg>
