<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1176 336" width="1176" height="336" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" role="img" aria-label="XAgent — build, run and monetize AI agents.">
  <defs>
    <!-- 14px pixel grid: engineering paper, kept extremely faint -->
    <pattern id="grid14" width="14" height="14" patternUnits="userSpaceOnUse">
      <path d="M14 0 H0 V14" fill="none" stroke="#0A0A0A" stroke-width="1" stroke-opacity="0.045"/>
    </pattern>
  </defs>

  <!-- paper -->
  <rect x="0" y="0" width="1176" height="336" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1176" height="336" fill="url(#grid14)"/>

  <!-- ===== registration corner brackets (green, the single accent) ===== -->
  <g fill="#63E6A2">
    <!-- TL -->
    <rect x="36" y="28" width="26" height="2"/><rect x="36" y="28" width="2" height="26"/><rect x="27" y="19" width="5" height="5"/>
    <!-- TR -->
    <rect x="1114" y="28" width="26" height="2"/><rect x="1138" y="28" width="2" height="26"/><rect x="1144" y="19" width="5" height="5"/>
    <!-- BL -->
    <rect x="36" y="306" width="26" height="2"/><rect x="36" y="282" width="2" height="26"/><rect x="27" y="312" width="5" height="5"/>
    <!-- BR -->
    <rect x="1114" y="306" width="26" height="2"/><rect x="1138" y="282" width="2" height="26"/><rect x="1144" y="312" width="5" height="5"/>
  </g>

  <!-- ===== top rail ===== -->
  <text x="56" y="46" font-family="'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" font-size="11" letter-spacing="2" fill="#8b8b8b">XAGENT — AI-NATIVE AGENT PLATFORM</text>
  <text x="1120" y="46" text-anchor="end" font-family="'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" font-size="11" letter-spacing="2" fill="#8b8b8b">SPEAK TO BUILD · SHARE TO CONNECT</text>
  <rect x="56" y="62" width="1064" height="1" fill="#0A0A0A" fill-opacity="0.12"/>
  <rect x="56" y="62" width="64" height="1" fill="#63E6A2"/>

  <!-- ===== brand lockup ===== -->
  <!-- logo: green circle + black angular X (brand mark), on the 14px grid -->
  <g transform="translate(60,118) scale(0.8125)">
    <circle cx="64" cy="64" r="64" fill="#63E6A2"/>
    <g stroke="#0A0A0A" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M40 38 L64 62 L88 38"/>
      <path d="M40 90 L64 66 L88 90"/>
    </g>
  </g>

  <!-- wordmark: uppercase grotesque, tight tracking -->
  <text x="204" y="196" font-size="100" font-weight="800" letter-spacing="-3.5" fill="#0A0A0A">XAGENT</text>

  <!-- sub label on the grid -->
  <text x="206" y="232" font-family="'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" font-size="11.5" letter-spacing="3.4" fill="#0A0A0A">BUILD<tspan fill="#8b8b8b"> · </tspan>RUN<tspan fill="#8b8b8b"> · </tspan>MONETIZE<tspan fill="#8b8b8b"> AI AGENTS</tspan></text>

  <!-- right-side metadata rail -->
  <rect x="1000" y="134" width="1" height="78" fill="#0A0A0A" fill-opacity="0.12"/>
  <rect x="1000" y="134" width="1" height="16" fill="#63E6A2"/>
  <text x="1120" y="152" text-anchor="end" font-family="'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" font-size="11.5" letter-spacing="2.4" fill="#0A0A0A">$XAGT</text>
  <text x="1120" y="178" text-anchor="end" font-family="'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" font-size="11.5" letter-spacing="2.4" fill="#8b8b8b">EST. 2025</text>
  <text x="1120" y="204" text-anchor="end" font-family="'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" font-size="11.5" letter-spacing="2.4" fill="#8b8b8b">TOKYO · JP</text>

  <!-- ===== bottom rail ===== -->
  <rect x="56" y="280" width="1064" height="1" fill="#0A0A0A" fill-opacity="0.12"/>
  <rect x="1056" y="280" width="64" height="1" fill="#63E6A2"/>
  <!-- 8-bit pixel-step colophon above the rail -->
  <g fill="#63E6A2">
    <rect x="56" y="266" width="5" height="5"/><rect x="61" y="261" width="5" height="5"/><rect x="66" y="256" width="5" height="5"/>
  </g>
  <text x="56" y="302" font-family="'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" font-size="11" letter-spacing="2" fill="#8b8b8b">XAGT.AI</text>
  <text x="588" y="302" text-anchor="middle" font-family="'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" font-size="11" letter-spacing="2" fill="#8b8b8b">ON-CHAIN BY DESIGN · SETTLED VIA X402</text>
  <text x="1120" y="302" text-anchor="end" font-family="'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" font-size="11" letter-spacing="2" fill="#8b8b8b">@XAGENT_OFFICIAL</text>
</svg>
