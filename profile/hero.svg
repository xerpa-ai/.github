<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1176 260" width="1176" height="260" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif" role="img" aria-label="XAgent — build, run and monetize AI agents.">
  <!-- paper -->
  <rect x="0" y="0" width="1176" height="260" fill="#FFFFFF"/>

  <!-- logo: green circle + black angular X (brand mark) -->
  <g transform="translate(72,66)">
    <circle cx="64" cy="64" r="64" fill="#63E6A2"/>
    <g stroke="#0A0A0A" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M40 36 L64 62 L88 36"/>
      <path d="M40 92 L64 66 L88 92"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="248" y="128" font-size="86" font-weight="700" letter-spacing="-2.5" fill="#0A0A0A">XAgent</text>

  <!-- tagline -->
  <text x="252" y="172" font-size="23" fill="#6b6b6b" letter-spacing="-0.2">Build, run &amp; monetize AI agents.</text>

  <!-- restrained mono marks, right -->
  <text x="1104" y="70" text-anchor="end" font-family="'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" font-size="12.5" letter-spacing="2.6" fill="#8b8b8b">$XAGT</text>
  <text x="1104" y="196" text-anchor="end" font-family="'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace" font-size="12.5" letter-spacing="2.6" fill="#8b8b8b">xagt.ai</text>
</svg>
